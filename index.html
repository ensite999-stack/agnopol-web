<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnopol | Digital Rights</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { space: '#020617', brand: '#38bdf8' } } } }
        
        // 配置
        const SB_URL = "https://tlsfyduighotjrsvjlqy.supabase.co";
        const SB_KEY = "Sb_publishable_qlqsvQJlcgXa6HMcXKJZ3Q_ejSvpjvy";
        
        // 初始保底价格
        const fallbacks = { 'premium_3m_price': '13.1', 'premium_6m_price': '17.1', 'premium_12m_price': '31.1', 'stars_unit_price': '0.02' };

        // 初始化 Supabase 客户端
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function syncLivePrices() {
            console.log("Connecting to Agnopol Cloud...");
            try {
                // 使用官方库读取设置
                let { data, error } = await supabase.from('settings').select('*');
                
                if (error) throw error;

                if (data && data.length > 0) {
                    console.log("Data Received:", data);
                    data.forEach(s => {
                        const el = document.getElementById('price-' + s.key);
                        if (el) {
                            el.innerText = '$' + s.value;
                            el.classList.add('text-brand', 'scale-110'); // 同步成功后数字变亮蓝并轻微放大
                        }
                    });
                } else {
                    console.log("No data found, using fallbacks.");
                    applyFallbacks();
                }
            } catch (err) {
                console.error("Connection lost, using secured fallbacks:", err);
                applyFallbacks();
            }
        }

        function applyFallbacks() {
            Object.keys(fallbacks).forEach(k => {
                const el = document.getElementById('price-' + k);
                if (el) el.innerText = '$' + fallbacks[k];
            });
        }

        window.onload = () => {
            syncLivePrices();
        };
    </script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid #1e293b; transition: all 0.3s; }
        .glass:hover { border-color: #38bdf8; transform: translateY(-5px); }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-2xl py-12 text-center">
        <h1 class="text-5xl font-black text-brand tracking-tighter italic italic">AGNOPOL</h1>
        <div class="h-1 w-20 bg-brand mx-auto mt-4 rounded-full"></div>
    </header>

    <main class="w-full max-w-2xl grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div class="glass p-8 rounded-[2.5rem]">
            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest">Premium 3 Months</h3>
            <p id="price-premium_3m_price" class="text-4xl font-black mt-3 transition-all duration-700">$0.0</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest">Premium 6 Months</h3>
            <p id="price-premium_6m_price" class="text-4xl font-black mt-3 transition-all duration-700">$0.0</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest">Premium 12 Months</h3>
            <p id="price-premium_12m_price" class="text-4xl font-black mt-3 transition-all duration-700">$0.0</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <h3 class="text-slate-500 text-xs font-bold uppercase tracking-widest">TG Stars Unit</h3>
            <p id="price-stars_unit_price" class="text-4xl font-black mt-3 transition-all duration-700">$0.0</p>
        </div>
    </main>

    <footer class="mt-20 text-[10px] text-slate-700 uppercase tracking-[0.3em] font-bold">
        Agnopol Cloud Protection System v2.0
    </footer>

</body>
</html>
