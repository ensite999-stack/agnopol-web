<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agnopol | Digital Rights Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { space: '#020617', brand: '#38bdf8' } } } }
    </script>
    <script>
        const SUPABASE_URL = "https://tlsfyduighotjrsvjlqy.supabase.co";
        const SUPABASE_KEY = "Sb_publishable_qlqsvQJlcgXa6HMcXKJZ3Q_ejSvpjvy";
        
        const i18n = {
            de: { title: "Dienste", tg3: "TG 3M", tg6: "TG 6M", tg12: "TG 12M", stars: "Stars", buy: "Kaufen", pay: "Bezahlt", total: "Gesamt", query: "Abfrage", email: "E-Mail", upload: "Beleg hochladen", terms: "Bedingungen", privacy: "Datenschutz", risk: "Risiko" },
            en: { title: "Services", tg3: "TG Premium 3M", tg6: "TG Premium 6M", tg12: "TG Premium 12M", stars: "TG Stars", buy: "Buy Now", pay: "I Have Paid", total: "Total", query: "Query", email: "Email", upload: "Upload Proof", terms: "Terms", privacy: "Privacy", risk: "Risk" },
            es: { title: "Servicios", tg3: "TG 3M", tg6: "TG 6M", tg12: "TG 12M", stars: "Stars", buy: "Comprar", pay: "Pagué", total: "Total", query: "Buscar", email: "Email", upload: "Subir prueba", terms: "Términos", privacy: "Privacidad", risk: "Riesgo" },
            fr: { title: "Services", tg3: "TG 3M", tg6: "TG 6M", tg12: "TG 12M", stars: "Stars", buy: "Acheter", pay: "Payé", total: "Total", query: "Suivi", email: "Email", upload: "Preuve", terms: "Conditions", privacy: "Confidentialité", risk: "Risques" },
            ja: { title: "サービス", tg3: "TG 3M", tg6: "TG 6M", tg12: "TG 12M", stars: "スター", buy: "購入", pay: "支払い済み", total: "合計", query: "照会", email: "メール", upload: "証明をアップロード", terms: "規約", privacy: "秘密", risk: "リスク" },
            'zh-CN': { title: "尊享服务", tg3: "TG 会员 3个月", tg6: "TG 会员 6个月", tg12: "TG 会员 12个月", stars: "TG 星星 (Stars)", buy: "立即购买", pay: "我已付款", total: "总金额", query: "查询", email: "电子邮箱", upload: "上传支付凭证", terms: "服务条款", privacy: "隐私政策", risk: "风险披露" },
            'zh-TW': { title: "尊享服務", tg3: "TG 會員 3個月", tg6: "TG 會員 6個月", tg12: "TG 會員 12個月", stars: "TG 星星 (Stars)", buy: "立即購買", pay: "我已付款", total: "總金額", query: "查詢", email: "電子郵箱", upload: "上傳支付憑證", terms: "服務條款", privacy: "隱私政策", risk: "風險披露" }
        };

        let lang = 'en';
        let starsPrice = 0.02;

        async function syncPrices() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/settings?select=*`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const data = await res.json();
                data.forEach(s => {
                    const el = document.getElementById('price-' + s.key);
                    if(el) el.innerText = '$' + s.value;
                    if(s.key === 'stars_unit_price') starsPrice = parseFloat(s.value);
                });
                updateStarsUI();
            } catch(e) { console.log("Sync failed"); }
        }

        function updateStarsUI() {
            const val = parseInt(document.getElementById('starCount').value) || 50;
            document.getElementById('price-stars').innerText = '$' + (val * starsPrice).toFixed(1);
        }

        function changeLang(l) {
            lang = l;
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = i18n[lang][el.getAttribute('data-i18n')]; });
            document.getElementById('emailInput').placeholder = i18n[lang].email;
        }

        window.onload = () => { syncPrices(); changeLang('en'); };
    </script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center select-none">
    <header class="w-full max-w-2xl flex justify-between items-center py-6">
        <h1 class="text-3xl font-bold text-brand">Agnopol</h1>
        <select onchange="changeLang(this.value)" class="bg-slate-900 border border-slate-800 text-xs rounded-lg p-2 text-slate-400">
            <option value="de">Deutsch</option><option value="en" selected>English</option>
            <option value="es">Español</option><option value="fr">Français</option>
            <option value="ja">日本語</option><option value="zh-CN">简体中文</option><option value="zh-TW">繁體中文</option>
        </select>
    </header>

    <main class="w-full max-w-2xl space-y-6">
        <div class="glass p-4 rounded-2xl flex gap-2">
            <input id="emailInput" type="email" class="flex-1 bg-transparent text-sm outline-none">
            <button onclick="query()" class="bg-brand text-white px-4 py-1.5 rounded-lg text-xs font-bold" data-i18n="query">Query</button>
        </div>

        <h2 class="text-xl font-bold" data-i18n="title">Services</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl cursor-pointer hover:border-brand" onclick="openPay('premium_3m', 'price-premium_3m_price')">
                <h3 class="text-slate-400 text-sm" data-i18n="tg3">TG 3M</h3>
                <p id="price-premium_3m_price" class="text-3xl font-bold mt-2 text-white">$0.0</p>
            </div>
            <div class="glass p-6 rounded-3xl cursor-pointer hover:border-brand" onclick="openPay('premium_6m', 'price-premium_6m_price')">
                <h3 class="text-slate-400 text-sm" data-i18n="tg6">TG 6M</h3>
                <p id="price-premium_6m_price" class="text-3xl font-bold mt-2 text-white">$0.0</p>
            </div>
            <div class="glass p-6 rounded-3xl cursor-pointer hover:border-brand" onclick="openPay('premium_12m', 'price-premium_12m_price')">
                <h3 class="text-slate-400 text-sm" data-i18n="tg12">TG 12M</h3>
                <p id="price-premium_12m_price" class="text-3xl font-bold mt-2 text-white">$0.0</p>
            </div>
            <div class="glass p-6 rounded-3xl border-slate-800">
                <h3 class="text-slate-400 text-sm" data-i18n="stars">TG Stars</h3>
                <input id="starCount" type="number" value="50" min="50" oninput="updateStarsUI()" class="w-full bg-slate-900 rounded-lg p-2 mt-2 text-brand font-bold outline-none">
                <div class="flex justify-between items-end mt-4">
                    <span id="price-stars" class="text-2xl font-bold text-white">$1.0</span>
                    <button onclick="openPay('stars', 'price-stars')" class="bg-slate-800 px-3 py-1 rounded text-[10px]" data-i18n="buy">Buy</button>
                </div>
            </div>
        </div>

        <div id="checkout" class="hidden glass p-6 rounded-3xl border-brand animate-fade-in space-y-6">
            <div class="flex justify-between items-end">
                <h3 class="text-lg font-bold">Payment</h3>
                <span id="finalPrice" class="text-3xl font-black text-brand">$0.0</span>
            </div>
            <div class="grid gap-3 text-[10px] font-mono">
                <div class="p-3 bg-slate-900 rounded-xl flex justify-between"><span>TRC20: TD6sQK9Nmq...</span><button onclick="copy('TD6sQK9NmqxKzP6WHvmUdkHQRZvwX6Cy1e')">Copy</button></div>
                <div class="p-3 bg-slate-900 rounded-xl flex justify-between"><span>Base: 0x21E43Ddaa...</span><button onclick="copy('0x21E43Ddaa992A0B5cfcCeFE98838239b9E91B40E')">Copy</button></div>
            </div>
            <input id="payEmail" type="email" placeholder="Email" class="w-full bg-slate-900 p-4 rounded-xl text-sm outline-none border border-slate-800 focus:border-brand">
            <div class="border-2 border-dashed border-slate-800 p-6 rounded-2xl text-center relative">
                <input type="file" accept="image/*" class="absolute inset-0 opacity-0" onchange="handleFile(this)">
                <span id="upText" class="text-xs text-slate-500" data-i18n="upload">Upload Proof</span>
            </div>
            <button id="payBtn" disabled onclick="submit()" class="w-full bg-slate-800 text-slate-500 py-4 rounded-2xl font-black transition" data-i18n="pay">I Have Paid</button>
        </div>
    </main>

    <footer class="mt-16 flex gap-4 text-[10px] text-slate-600 uppercase">
        <button data-i18n="terms">Terms</button><button data-i18n="privacy">Privacy</button><button data-i18n="risk">Risk</button>
    </footer>

    <script>
        let curType = '';
        let curPrice = 0;
        let proof = '';

        function openPay(type, priceId) {
            curType = type;
            curPrice = document.getElementById(priceId).innerText;
            document.getElementById('finalPrice').innerText = curPrice;
            document.getElementById('checkout').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function handleFile(input) {
            const file = input.files[0];
            if(!file) return;
            document.getElementById('upText').innerText = "✅ Received";
            const r = new FileReader();
            r.onload = (e) => { 
                proof = e.target.result; 
                const b = document.getElementById('payBtn');
                b.disabled = false; b.classList.replace('bg-slate-800', 'bg-brand'); b.classList.replace('text-slate-500', 'text-white');
            };
            r.readAsDataURL(file);
        }

        async function submit() {
            const email = document.getElementById('payEmail').value;
            if(!email) return alert("Email Required");
            const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
                body: JSON.stringify({ order_no: 'AG'+Date.now().toString().slice(-6), email, product_type: curType, amount: curPrice.replace('$',''), proof_file_key: proof, status: 'paid' })
            });
            if(res.ok) { alert("Success!"); location.reload(); }
        }

        function copy(t) { navigator.clipboard.writeText(t); alert("Copied"); }
    </script>
</body>
</html>
