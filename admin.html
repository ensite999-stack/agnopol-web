<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnopol Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { space: '#020617', brand: '#38bdf8' } } } }
    </script>
</head>
<body class="bg-space text-slate-300 p-4 md:p-10 font-sans">
    <div id="login" class="max-w-sm mx-auto mt-32 text-center">
        <h1 class="text-3xl font-bold text-brand mb-8">GOD MODE</h1>
        <input type="password" id="pw" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl mb-4 text-center outline-none focus:border-brand">
        <button onclick="login()" class="w-full bg-brand text-white py-4 rounded-xl font-bold">Access Dashboard</button>
    </div>

    <div id="main" class="hidden max-w-5xl mx-auto">
        <header class="flex justify-between items-center py-6 border-b border-slate-800 mb-8">
            <h1 class="text-2xl font-bold text-white">System Console</h1>
            <button onclick="cleanup()" class="bg-red-500/10 text-red-500 text-[10px] px-3 py-1 rounded border border-red-500/20">PURGE 48H</button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 bg-slate-900/50 p-6 rounded-2xl" id="prices"></section>
        <button onclick="save()" class="w-full bg-slate-800 py-3 rounded-xl text-xs font-bold mb-10">SYNC CLOUD PRICES</button>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-bold text-slate-500 uppercase">Live Orders</h2>
            <input type="text" id="q" oninput="render()" placeholder="Search Email / Order..." class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-xs outline-none focus:border-brand">
        </div>
        <div id="list" class="space-y-4"></div>
    </div>

    <div id="viewer" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center" onclick="this.classList.add('hidden')">
        <img id="vimg" class="max-w-full max-h-[90vh]">
    </div>

    <script>
        let auth = "";
        let orders = [];
        let settings = [];

        async function login() {
            auth = document.getElementById('pw').value;
            const res = await api('fetch_all');
            if(res.error) return alert("Fail");
            localStorage.setItem('agn_pw', auth);
            init(res);
        }

        async function api(a, d={}) {
            const r = await fetch('/api/admin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: auth, action: a, data: d }) });
            return await r.json();
        }

        function init(data) {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            settings = data.settings;
            orders = data.orders;
            const p = document.getElementById('prices');
            p.innerHTML = settings.map(s => `<div><label class="text-[9px] uppercase">${s.key}</label><input id="s-${s.key}" value="${s.value}" class="w-full bg-transparent border-b border-slate-800 text-brand font-bold py-1"></div>`).join('');
            render();
            setInterval(async () => { const d = await api('fetch_all'); orders = d.orders; render(); }, 20000);
        }

        function render() {
            const q = document.getElementById('q').value.toLowerCase();
            const filtered = orders.filter(o => o.email.toLowerCase().includes(q) || o.order_no.toLowerCase().includes(q));
            document.getElementById('list').innerHTML = filtered.map(o => `
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                    <div><b class="text-brand text-xs">${o.order_no}</b><p class="text-white text-sm">${o.product_type} ($${o.amount})</p><p class="text-[10px] opacity-50">${o.email}</p></div>
                    <div class="flex gap-2">
                        <button onclick="view('${o.proof_file_key}')" class="text-[10px] bg-slate-800 px-2 py-1 rounded">Proof</button>
                        <select onchange="update('${o.id}', this.value)" class="bg-black text-[10px] p-1 rounded"><option value="paid" ${o.status==='paid'?'selected':''}>Paid</option><option value="completed" ${o.status==='completed'?'selected':''}>Done</option></select>
                    </div>
                </div>`).join('');
        }

        async function save() {
            const up = settings.map(s => ({ key: s.key, value: document.getElementById('s-'+s.key).value }));
            await api('update_prices', { settings: up });
            alert("Updated");
        }

        async function update(id, s) { await api('update_order', { id, update: { status: s } }); }
        function view(s) { document.getElementById('vimg').src = s; document.getElementById('viewer').classList.remove('hidden'); }
        async function cleanup() { const t = new Date(Date.now() - 48*3600000).toISOString(); await api('cleanup', { threshold: t }); }
        
        window.onload = () => { if(localStorage.getItem('agn_pw')) { document.getElementById('pw').value = localStorage.getItem('agn_pw'); login(); } };
    </script>
</body>
</html>
